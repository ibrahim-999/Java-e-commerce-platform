# ==================== User Service Configuration ====================
# Only settings UNIQUE to user-service go here.
# Shared settings (Eureka, Actuator, Kafka, etc.) come from application.properties.

server.port=8081

# ==================== HTTPS / SSL ====================
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=userservice

# ==================== Database ====================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/users_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==================== Flyway ====================
spring.flyway.locations=classpath:db/migration

# ==================== JWT ====================
jwt.secret=${JWT_SECRET:my-super-secret-key-that-is-at-least-32-characters-long}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# ==================== Kafka Producer ====================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# NOTE: spring.profiles.active CANNOT be set here — Spring Boot requires it
# to be set locally in each service's application.properties.
# The "dev" profile is set in user-service's own application.properties.

# ==================== Actuator (override for detailed health) ====================
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=User Service
info.app.description=User management microservice for the e-commerce platform
info.app.version=0.0.1

# ==================== Eureka HTTPS registration ====================
eureka.instance.secure-port-enabled=true
eureka.instance.secure-port=${server.port}
eureka.instance.non-secure-port-enabled=false
