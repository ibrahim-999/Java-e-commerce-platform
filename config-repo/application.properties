# ==================== SHARED CONFIGURATION ====================
# This file is served to ALL services by the Config Server.
# Any property here applies to every microservice unless overridden
# in the service-specific file (e.g., user-service.properties).
#
# Think of it like CSS: this is the "base stylesheet" and each service
# can override specific properties in its own file.

# ==================== Eureka (shared by all services) ====================
eureka.client.service-url.defaultZone=http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@${EUREKA_HOST:localhost}:8761/eureka
eureka.instance.prefer-ip-address=true

# ==================== Actuator (shared by all services) ====================
management.endpoints.web.exposure.include=health,info,prometheus

# ==================== Kafka (shared by producers and consumers) ====================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# ==================== JPA defaults (shared by services with databases) ====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==================== Flyway (shared by services with databases) ====================
spring.flyway.enabled=true

# ==================== Swagger (shared by services with REST APIs) ====================
springdoc.swagger-ui.path=/swagger-ui.html

# ==================== Redis Cache (shared by services using caching) ====================
# Services that use Redis caching (product-service, user-service) will pick these up.
# Services without Redis dependencies will ignore them.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ==================== Distributed Tracing (Zipkin + Micrometer) ====================
# Send 100% of traces to Zipkin in dev. In production, you'd lower this
# to 10-20% (0.1 to 0.2) to reduce overhead.
management.tracing.sampling.probability=1.0

# Zipkin server URL — where trace data is sent for visualization.
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

# ==================== Structured Logging ====================
# Include the traceId and spanId in every log line.
# %X{traceId} and %X{spanId} are pulled from SLF4J's MDC (Mapped Diagnostic Context).
# Micrometer Tracing automatically populates these values.
#
# Log format: timestamp [service-name, traceId, spanId] level class - message
#
# Example output:
#   2026-03-10 12:00:00 [user-service, 6a3f2b1c4d5e6f7a, 8b9c0d1e2f3a4b5c] INFO  c.e.u.UserService - User registered
#   2026-03-10 12:00:00 [notification-service, 6a3f2b1c4d5e6f7a, 1c2d3e4f5a6b7c8d] INFO  c.e.n.Consumer - Sending welcome email
#
# Notice: SAME traceId across both services — that's how you correlate logs!
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}, %X{traceId:-}, %X{spanId:-}] %-5level %logger{36} - %msg%n
