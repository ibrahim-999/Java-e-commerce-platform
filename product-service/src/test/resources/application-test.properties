# Test profile — uses a separate test database
spring.datasource.url=jdbc:postgresql://localhost:5436/products_test_db
spring.datasource.username=admin
spring.datasource.password=admin123

# Let Hibernate create/drop tables in tests (no Flyway)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.show-sql=false
