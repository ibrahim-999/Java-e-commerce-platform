# Test profile — uses Testcontainers for PostgreSQL and Redis.
# Database connection is injected dynamically by BaseIntegrationTest.

# Let Hibernate create/drop tables in tests (no Flyway)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.show-sql=false

# Use Redis cache type (Testcontainers provides the connection)
spring.cache.type=redis
