# ==================== Server ====================
spring.application.name=order-service
server.port=8083

# ==================== Database ====================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/orders_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin123}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==================== Flyway ====================
spring.flyway.enabled=true

# ==================== Swagger ====================
springdoc.swagger-ui.path=/swagger-ui.html

# ==================== Actuator ====================
management.endpoints.web.exposure.include=health,info

# ==================== Service URLs ====================
# These are the base URLs for the other microservices.
# In production, these would come from a service registry (Eureka) or config server.
# For now, they're hardcoded — each service runs on its own port.
service.user-service.url=${USER_SERVICE_URL:https://localhost:8081}
service.product-service.url=${PRODUCT_SERVICE_URL:http://localhost:8082}
service.payment-service.url=${PAYMENT_SERVICE_URL:http://localhost:8084}

# ==================== Kafka Producer ====================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ==================== Resilience4j Circuit Breaker ====================
# slidingWindowSize: how many recent calls to consider (last 5 calls)
# failureRateThreshold: if 50% of recent calls fail, open the circuit
# waitDurationInOpenState: how long to wait before trying again (10 seconds)
# permittedNumberOfCallsInHalfOpenState: how many test calls in half-open state
resilience4j.circuitbreaker.instances.userService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.userService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userService.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.userService.permittedNumberOfCallsInHalfOpenState=2

resilience4j.circuitbreaker.instances.productService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.productService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.productService.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.productService.permittedNumberOfCallsInHalfOpenState=2

resilience4j.circuitbreaker.instances.paymentService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.paymentService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.paymentService.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.paymentService.permittedNumberOfCallsInHalfOpenState=2
