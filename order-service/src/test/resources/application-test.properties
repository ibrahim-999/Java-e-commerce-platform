# Test profile — uses Testcontainers for PostgreSQL.
# Database connection is injected dynamically by BaseIntegrationTest.

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.show-sql=false

# Service URLs (not used in unit tests, but needed for context loading)
service.user-service.url=https://localhost:8081
service.product-service.url=http://localhost:8082
service.payment-service.url=http://localhost:8084
