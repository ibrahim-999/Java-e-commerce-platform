# ==================== CONFIG SERVER ====================
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888

# ==================== API Gateway Configuration ====================

spring.application.name=api-gateway
server.port=${GATEWAY_PORT:8060}

# ==================== Eureka Client ====================
# The gateway registers with Eureka so it can be monitored,
# AND uses Eureka to discover where other services are.

eureka.client.service-url.defaultZone=http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@${EUREKA_HOST:localhost}:8761/eureka
eureka.instance.prefer-ip-address=true

# ==================== Route Definitions ====================
# Each route maps a URL pattern to a service.
# "lb://" means "load-balanced" — the gateway asks Eureka for the service address
# instead of using a hardcoded URL. If there are multiple instances,
# it automatically round-robins between them.
#
# How it works:
#   Client request: GET http://localhost:8080/api/users/1
#   Gateway matches: path=/api/users/** → route to lb://user-service
#   Gateway asks Eureka: "Where is user-service?" → "192.168.1.5:8081"
#   Gateway forwards: GET http://192.168.1.5:8081/api/users/1

# --- User Service Routes ---
# Note: lb:https:// because user-service uses HTTPS (self-signed cert)
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb:https://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**,/api/auth/**
spring.cloud.gateway.routes[0].metadata.response-timeout=5000

# --- Product Service Routes ---
spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=lb://product-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**,/api/categories/**
spring.cloud.gateway.routes[1].metadata.response-timeout=5000

# --- Order Service Routes ---
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://order-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[2].metadata.response-timeout=10000

# --- Payment Service Routes ---
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://payment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.routes[3].metadata.response-timeout=10000

# --- Discovery Server (Eureka Dashboard) ---
# Allows accessing the Eureka dashboard through the gateway at /eureka/web
spring.cloud.gateway.routes[4].id=discovery-server
spring.cloud.gateway.routes[4].uri=http://${EUREKA_HOST:localhost}:8761
spring.cloud.gateway.routes[4].predicates[0]=Path=/eureka/web/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/eureka/web/(?<remaining>.*), /${remaining}

# Eureka static resources (CSS, JS for the dashboard)
spring.cloud.gateway.routes[5].id=discovery-server-static
spring.cloud.gateway.routes[5].uri=http://${EUREKA_HOST:localhost}:8761
spring.cloud.gateway.routes[5].predicates[0]=Path=/eureka/**

# ==================== Default Filters ====================
# These filters apply to ALL routes.

# CircuitBreaker — if a downstream service is down, fail fast (5 seconds)
# instead of hanging indefinitely. Returns 504 Gateway Timeout.
spring.cloud.gateway.default-filters[0]=CircuitBreaker=name=defaultCircuitBreaker,fallbackUri=forward:/fallback

# ==================== Actuator ====================
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true

# ==================== Logging ====================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.ecommerce.gateway=INFO

# ==================== DISTRIBUTED TRACING ====================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}, %X{traceId:-}, %X{spanId:-}] %-5level %logger{36} - %msg%n
