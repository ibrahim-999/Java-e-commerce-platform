# ==================== Server ====================
spring.application.name=config-server
server.port=8888

# ==================== Config Server Backend ====================
# Config Server can read configurations from different backends:
#   - "git"    → reads from a Git repository (production recommended)
#   - "native" → reads from the local filesystem (simpler for development)
#
# We use "native" for now — config files live in a folder on this machine.
# In production, you'd switch to a Git repo for version control and audit trails.
spring.profiles.active=native

# Where the config files live on the filesystem.
# Spring Cloud Config looks for files named {application}.properties in this folder.
# "file:" prefix means absolute filesystem path.
# "classpath:" would look inside the JAR (less flexible).
spring.cloud.config.server.native.search-locations=file:${CONFIG_DIR:${user.home}/ecommerce-platform/config-repo}

# ==================== Eureka ====================
# Register with Eureka so other services can find us by name.
eureka.client.service-url.defaultZone=http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@${EUREKA_HOST:localhost}:8761/eureka
eureka.instance.prefer-ip-address=true

# ==================== Actuator ====================
management.endpoints.web.exposure.include=health,info

# ==================== DISTRIBUTED TRACING ====================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}, %X{traceId:-}, %X{spanId:-}] %-5level %logger{36} - %msg%n
