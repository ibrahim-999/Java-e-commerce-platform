# ==================== Secrets ====================
#
# A Secret is like a ConfigMap, but for SENSITIVE data (passwords, tokens, keys).
#
# KEY DIFFERENCES from ConfigMap:
#   1. Values are base64-encoded (NOT encrypted — just encoded!)
#   2. Kubernetes restricts access to Secrets more tightly
#   3. Secrets can be encrypted at rest if you configure the cluster
#   4. They show up as "[REDACTED]" in some kubectl outputs
#
# IMPORTANT SECURITY NOTE:
#   base64 is NOT encryption. Anyone who gets the YAML can decode it:
#     echo "YWRtaW4xMjM=" | base64 -d    →    "admin123"
#   In production, use tools like:
#     - Sealed Secrets (encrypted Secrets that are safe to commit to Git)
#     - HashiCorp Vault (external secret management)
#     - AWS Secrets Manager / Azure Key Vault
#   For learning, plain Secrets are fine.
#
# HOW TO ENCODE VALUES:
#   echo -n "admin123" | base64    →    YWRtaW4xMjM=
#   The -n flag is critical: without it, echo adds a newline (\n)
#   and your password would be "admin123\n" (broken!).
#
# In Docker Compose, these lived in the .env file.
# In Kubernetes, they live in Secrets and are injected as env vars.

apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secrets
  namespace: ecommerce
  labels:
    app.kubernetes.io/part-of: ecommerce-platform
type: Opaque    # "Opaque" = generic secret (as opposed to TLS certs or Docker registry creds)
data:
  # echo -n "admin" | base64
  DB_USERNAME: YWRtaW4=
  # echo -n "admin123" | base64
  DB_PASSWORD: YWRtaW4xMjM=
  # echo -n "changeit" | base64
  SSL_KEYSTORE_PASSWORD: Y2hhbmdlaXQ=
  # echo -n "my-super-secret-key-that-is-at-least-32-characters-long" | base64
  JWT_SECRET: bXktc3VwZXItc2VjcmV0LWtleS10aGF0LWlzLWF0LWxlYXN0LTMyLWNoYXJhY3RlcnMtbG9uZw==
  # echo -n "eureka" | base64
  EUREKA_USERNAME: ZXVyZWth
  # echo -n "eureka123" | base64
  EUREKA_PASSWORD: ZXVyZWthMTIz
