# ==================== API Gateway ====================
#
# The API Gateway is the SINGLE ENTRY POINT for all client requests.
# Instead of clients knowing about 5 different service URLs,
# they send everything to the gateway and it routes to the right service.
#
# What the gateway does:
#   1. ROUTING: /api/users/** → user-service, /api/products/** → product-service
#   2. RATE LIMITING: prevents abuse (too many requests per second)
#   3. CIRCUIT BREAKING: stops calling a service that's down
#   4. REQUEST LOGGING: logs every request for debugging
#
# The gateway discovers services via Eureka (service registry).
# When a request comes in for /api/products/1, it asks Eureka:
#   "Where is product-service?" → Eureka responds with the Pod IP → gateway forwards
#
# SERVICE TYPE: NodePort
#   Unlike internal services (ClusterIP), the gateway needs to be accessible
#   from outside the cluster. NodePort exposes a port on the minikube node
#   that forwards to the gateway Pod.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ecommerce
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8060
          env:
            - name: EUREKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: EUREKA_USERNAME
            - name: EUREKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: EUREKA_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://$(EUREKA_USERNAME):$(EUREKA_PASSWORD)@discovery-server:8761/eureka/"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8060
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8060
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
# NodePort Service: makes the gateway accessible from outside the cluster.
#
# Service types explained:
#   - ClusterIP (default): only reachable INSIDE the cluster
#   - NodePort: exposes a port (30000-32767) on the cluster node
#   - LoadBalancer: provisions an external load balancer (cloud only)
#   - ExternalName: DNS alias to an external service
#
# With NodePort, you access the gateway at: http://<minikube-ip>:30080
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ecommerce
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8060               # Internal cluster port
      targetPort: 8060          # Container port
      nodePort: 30080           # External port (accessible from host)
