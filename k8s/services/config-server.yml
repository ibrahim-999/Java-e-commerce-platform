# ==================== Config Server ====================
#
# Spring Cloud Config Server centralizes configuration for all services.
# Instead of each service having its own application.properties with
# database URLs, Kafka addresses, etc., they fetch config from here.
#
# HOW IT WORKS:
#   1. Config Server starts and loads config from the config-repo/ directory
#   2. Each service starts and calls: GET http://config-server:8888/{service-name}/default
#   3. Config Server returns the configuration for that service
#   4. The service merges remote config with its local application.properties
#
# Config Server must start AFTER Discovery Server but BEFORE business services.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: ecommerce
  labels:
    app: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: config-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8888
          env:
            - name: EUREKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: EUREKA_USERNAME
            - name: EUREKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: EUREKA_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://$(EUREKA_USERNAME):$(EUREKA_PASSWORD)@discovery-server:8761/eureka/"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: ecommerce
spec:
  selector:
    app: config-server
  ports:
    - port: 8888
      targetPort: 8888
