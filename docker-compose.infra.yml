# Infrastructure-only Docker Compose
# Used during development — run your Spring Boot apps separately from the terminal
# Start with:  docker compose -f docker-compose.infra.yml up -d
# Stop with:   docker compose -f docker-compose.infra.yml down

services:

  # ==================== PostgreSQL (Users DB) ====================
  # This is the database for the user-service.
  # Each microservice will get its own database — they never share.
  postgres-users:
    image: postgres:16
    container_name: postgres-users
    environment:
      POSTGRES_DB: users_db          # creates this database on first startup
      POSTGRES_USER: admin           # the database username
      POSTGRES_PASSWORD: admin123    # the database password (use env vars in production!)
    ports:
      - "5432:5432"                  # host:container — access on localhost:5432
    volumes:
      - postgres_users_data:/var/lib/postgresql/data   # persist data across restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d users_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== PostgreSQL (Products DB) ====================
  # Separate database for product-service. Port 5436 on host.
  postgres-products:
    image: postgres:16
    container_name: postgres-products
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5436:5432"                  # mapped to 5436 on host (5433 taken by another project)
    volumes:
      - postgres_products_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d products_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== PostgreSQL (Orders DB) ====================
  # Separate database for order-service. Port 5434.
  postgres-orders:
    image: postgres:16
    container_name: postgres-orders
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"
    volumes:
      - postgres_orders_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== PostgreSQL (Payments DB) ====================
  # Separate database for payment-service. Port 5435.
  postgres-payments:
    image: postgres:16
    container_name: postgres-payments
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5435:5432"
    volumes:
      - postgres_payments_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d payments_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== pgAdmin (Database UI) ====================
  # A web-based GUI to view and manage your PostgreSQL databases.
  # Access at: http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com     # login email for pgAdmin
      PGADMIN_DEFAULT_PASSWORD: admin123          # login password for pgAdmin
    ports:
      - "5050:80"                    # pgAdmin runs on port 80 inside container, we map it to 5050
    depends_on:
      postgres-users:
        condition: service_healthy
      postgres-products:
        condition: service_healthy
      postgres-orders:
        condition: service_healthy
      postgres-payments:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ==================== Zookeeper ====================
  # Zookeeper is Kafka's "manager" — it keeps track of which Kafka brokers are alive,
  # which topics exist, and who is the leader for each partition.
  # Think of it as the air traffic controller for Kafka.
  # Note: Newer Kafka versions (3.5+) can run WITHOUT Zookeeper (KRaft mode),
  # but the Confluent images we use still require it.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181           # port Kafka uses to talk to Zookeeper
      ZOOKEEPER_TICK_TIME: 2000             # heartbeat interval (ms) — how often Zookeeper checks if Kafka is alive
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Mode"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Kafka ====================
  # Kafka is the message broker — it receives messages from producers (our services)
  # and delivers them to consumers (notification-service).
  #
  # Key concepts:
  #   - Topic: a named channel (e.g., "user-events", "order-events")
  #   - Producer: publishes messages to a topic
  #   - Consumer: reads messages from a topic
  #   - Partition: a topic is split into partitions for parallel processing
  #   - Offset: the position of a message within a partition (like a bookmark)
  #
  # Messages are PERSISTED on disk — even if notification-service is down,
  # messages wait in Kafka until it comes back up. This is the key advantage
  # over direct HTTP calls.
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1                                           # unique ID for this broker
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181                      # where to find Zookeeper
      # Two listeners: one for apps running on your HOST machine (localhost:9092),
      # one for apps running INSIDE Docker (kafka:29092).
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1                    # only 1 broker, so replication = 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1                       # minimum in-sync replicas
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1            # same reason — single broker
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==================== Zipkin (Distributed Tracing) ====================
  # Zipkin collects and visualizes trace data from all services.
  # When a request flows through Gateway → order-service → user-service → payment-service,
  # Zipkin shows the ENTIRE journey as a timeline — which services were called,
  # how long each took, and where errors occurred.
  #
  # Each service sends trace data to Zipkin via HTTP (port 9411).
  # Access the Zipkin UI at: http://localhost:9411
  #
  # How it works:
  #   1. Gateway receives a request, generates a traceId (e.g., "abc123")
  #   2. Gateway forwards the request to order-service with traceId in headers
  #   3. order-service calls user-service, passing the SAME traceId
  #   4. Each service reports its "span" (timing data) to Zipkin
  #   5. Zipkin assembles all spans into a complete trace and shows the timeline
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Kafka UI ====================
  # A web-based dashboard to see your Kafka topics, messages, consumers, and more.
  # Like pgAdmin but for Kafka. Access at: http://localhost:8090
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local                                 # display name in the UI
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092               # internal Docker listener
    ports:
      - "8090:8080"                                                # Kafka UI runs on 8080 inside, we map to 8090

# ==================== VOLUMES ====================
# Named volumes persist data even if you stop/remove containers.
# Without volumes, your database would be empty every time you restart.
volumes:
  postgres_users_data:
  postgres_products_data:
  postgres_orders_data:
  postgres_payments_data:
  pgadmin_data:
