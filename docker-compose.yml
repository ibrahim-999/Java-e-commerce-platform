# Full-stack Docker Compose — runs ALL services + ALL infrastructure.
# This is how the platform runs in production — everything in containers.
#
# Start:  docker compose up -d --build
# Stop:   docker compose down
# Logs:   docker compose logs -f
# Rebuild one service: docker compose up -d --build user-service
#
# IMPORTANT: Inside Docker, services communicate using CONTAINER NAMES, not localhost.
# For example, user-service connects to "postgres-users:5432" (not "localhost:5432").
# The "ports" section maps container ports to your host machine for external access.

services:

  # ==========================================
  # DATABASES — one per service (database-per-service pattern)
  # ==========================================

  postgres-users:
    image: postgres:16
    container_name: postgres-users
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d users_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-products:
    image: postgres:16
    container_name: postgres-products
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5436:5432"
    volumes:
      - postgres_products_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d products_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-orders:
    image: postgres:16
    container_name: postgres-orders
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"
    volumes:
      - postgres_orders_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payments:
    image: postgres:16
    container_name: postgres-payments
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5435:5432"
    volumes:
      - postgres_payments_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d payments_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # pgAdmin — Database management UI
  # ==========================================

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres-users:
        condition: service_healthy
      postgres-products:
        condition: service_healthy
      postgres-orders:
        condition: service_healthy
      postgres-payments:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ==========================================
  # KAFKA — async messaging infrastructure
  # ==========================================

  # Zookeeper — Kafka's cluster coordinator.
  # Tracks which brokers are alive, manages topic metadata.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Mode"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka — the message broker. Receives events from producers, delivers to consumers.
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Inside Docker, services connect via kafka:29092 (container network).
      # From host machine, connect via localhost:9092.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka UI — web dashboard for Kafka topics, messages, and consumers.
  # Access at: http://localhost:8090
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8090:8080"

  # ==========================================
  # TRACING — distributed request tracing
  # ==========================================

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # REDIS — in-memory cache
  # ==========================================

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # PLATFORM SERVICES — service discovery, config, gateway
  # ==========================================

  # ---------- Discovery Server (Eureka, port 8761) ----------
  # Service registry — all services register here so they can find each other.
  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      EUREKA_USERNAME: eureka
      EUREKA_PASSWORD: eureka123
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    depends_on:
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://eureka:eureka123@localhost:8761/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------- Config Server (port 8888) ----------
  # Centralized configuration — serves properties to all services.
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      EUREKA_USERNAME: eureka
      EUREKA_PASSWORD: eureka123
      EUREKA_HOST: discovery-server
      CONFIG_DIR: /config-repo
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    volumes:
      - ./config-repo:/config-repo:ro
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------- API Gateway (port 8060) ----------
  # Single entry point for all client requests.
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8060:8060"
    environment:
      EUREKA_USERNAME: eureka
      EUREKA_PASSWORD: eureka123
      EUREKA_HOST: discovery-server
      CONFIG_SERVER_HOST: config-server
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8060/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==========================================
  # BUSINESS SERVICES — the application layer
  # ==========================================

  # ---------- User Service (port 8081, HTTPS) ----------
  # Handles: registration, login, JWT auth, user management
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres-users:5432/users_db
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      SSL_KEYSTORE_PASSWORD: changeit
      JWT_SECRET: my-super-secret-key-that-is-at-least-32-characters-long
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_HOST: discovery-server
      CONFIG_SERVER_HOST: config-server
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      REDIS_HOST: redis
      SPRING_JPA_SHOW_SQL: "false"
    depends_on:
      postgres-users:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sfk https://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------- Product Service (port 8082) ----------
  # Handles: products, categories, inventory, stock management
  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres-products:5432/products_db
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      EUREKA_HOST: discovery-server
      CONFIG_SERVER_HOST: config-server
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      REDIS_HOST: redis
      SPRING_JPA_SHOW_SQL: "false"
    depends_on:
      postgres-products:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------- Notification Service (port 8085) ----------
  # Kafka consumer — listens for events from other services and logs notifications.
  # No database needed — it only reads from Kafka topics.
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8085:8085"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_HOST: discovery-server
      CONFIG_SERVER_HOST: config-server
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    depends_on:
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------- Payment Service (port 8084) ----------
  # Handles: payment processing, gateways (Stripe/PayPal/Bank), refunds, transaction history
  # Started BEFORE order-service because order-service calls payment-service.
  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      DB_URL: jdbc:postgresql://postgres-payments:5432/payments_db
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_HOST: discovery-server
      CONFIG_SERVER_HOST: config-server
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      SPRING_JPA_SHOW_SQL: "false"
    depends_on:
      postgres-payments:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------- Order Service (port 8083) ----------
  # Handles: order creation, cancellation, status history
  # Calls: user-service, product-service, payment-service
  # Started LAST because it depends on all other services.
  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres-orders:5432/orders_db
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      USER_SERVICE_URL: https://user-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8084
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_HOST: discovery-server
      CONFIG_SERVER_HOST: config-server
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      SPRING_JPA_SHOW_SQL: "false"
    depends_on:
      postgres-orders:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# ==========================================
# VOLUMES — persistent data storage
# ==========================================
# Named volumes keep data across container restarts.
# Without these, your databases would be empty every time you restart.

volumes:
  postgres_users_data:
  postgres_products_data:
  postgres_orders_data:
  postgres_payments_data:
  pgadmin_data:
  redis_data:
