# ==================== Eureka Discovery Server ====================

spring.application.name=discovery-server
server.port=8761

# --- Eureka Self-Registration ---
# By default, Eureka tries to register ITSELF as a client (with itself).
# Since this IS the server, we disable that — it would create a confusing loop.
eureka.client.register-with-eureka=false
# Don't try to fetch the registry from another Eureka server
# (we only have one Eureka instance in our setup)
eureka.client.fetch-registry=false

# --- Dashboard ---
# The Eureka web UI is available at http://localhost:8761
# It shows all registered services, their status, and health info.
eureka.dashboard.enabled=true

# --- Security ---
# Basic auth credentials for the Eureka dashboard.
# Services use these credentials when registering with Eureka.
spring.security.user.name=${EUREKA_USERNAME}
spring.security.user.password=${EUREKA_PASSWORD}
