# ==================== CONFIG SERVER ====================
# Import configuration from the Config Server.
# "optional:" means: if the config server is down, use local properties instead of failing.
# The config server serves properties from config-repo/user-service.properties + config-repo/application.properties.
# Local properties (this file) OVERRIDE remote ones, so you can always customize locally.
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888

# ==================== PROFILE ====================
# Activates the "dev" profile — enables DataSeeder and dev-specific config.
# Change to "prod" in production to disable seeders and dev tools.
spring.profiles.active=dev

# ==================== SERVER ====================
# The port your app listens on. Default is 8080, but we use 8081
# so it won't conflict with the API Gateway later (which will use 8080).
server.port=8081

# Give your app a name — used by Eureka, logging, and actuator
spring.application.name=user-service

# ==================== HTTPS / SSL ====================
# Enable HTTPS using a self-signed certificate stored in a PKCS12 keystore.
# keystore.p12 sits in src/main/resources — Spring Boot finds it via classpath.
# In production, you'd use a real certificate from Let's Encrypt or similar.
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=userservice

# ==================== ACTUATOR ====================
# Expose the health and info endpoints so you can check if the app is alive.
# By default, only /actuator/health is exposed. We add /actuator/info too.
# "caches" exposes /actuator/caches — shows all Redis cache names and stats.
management.endpoints.web.exposure.include=health,info,caches,prometheus

# Show full health details (useful for debugging, shows DB status later)
management.endpoint.health.show-details=always

# App info that shows up at /actuator/info
management.info.env.enabled=true
info.app.name=User Service
info.app.description=User management microservice for the e-commerce platform
info.app.version=0.0.1

# ==================== DATABASE (PostgreSQL) ====================
# JDBC URL: tells Java how to connect to the database
# jdbc:postgresql:// = protocol (like https:// for web)
# localhost:5432     = where PostgreSQL is running (our Docker container)
# users_db           = the database name (created by Docker Compose)
# ${VAR:default} syntax: reads from environment variable, falls back to default.
# In production, set these env vars — never rely on the defaults.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/users_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin123}

# Tell Hibernate which SQL dialect to use (PostgreSQL-specific SQL features)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate DDL strategy: "validate" = check that entities match the DB schema
# We use Flyway for migrations, so Hibernate should only validate, never create/drop tables
spring.jpa.hibernate.ddl-auto=validate

# Show the SQL that Hibernate generates (useful for learning, disable in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==================== FLYWAY ====================
# Flyway looks for migration scripts in src/main/resources/db/migration/
# Files must be named: V1__description.sql, V2__description.sql, etc.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ==================== JWT ====================
# Secret key used to sign JWT tokens (minimum 256-bit / 32 chars for HS256).
# MUST be set via environment variable in production — never use the default.
jwt.secret=${JWT_SECRET:my-super-secret-key-that-is-at-least-32-characters-long}

# Token expiry times in milliseconds
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# ==================== Kafka Producer ====================
# bootstrap-servers: address of the Kafka broker.
# "localhost:9092" for local dev, "kafka:9092" inside Docker.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Serialization: how to convert Java objects into bytes for Kafka.
# Keys and values are both Strings (we serialize events to JSON manually).
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ==================== SWAGGER / OPENAPI ====================
# Path where Swagger UI will be accessible
springdoc.swagger-ui.path=/swagger-ui.html

# ==================== Redis Cache ====================
# Redis connection — "localhost" for local dev, "redis" inside Docker.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# Cache type — tells Spring to use Redis as the cache backend (not in-memory)
spring.cache.type=redis

# ==================== EUREKA SERVICE DISCOVERY ====================
# Register this service with Eureka so other services (and the gateway) can find it.
# The URL includes basic auth credentials (eureka:eureka123) to authenticate with the server.
eureka.client.service-url.defaultZone=http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@${EUREKA_HOST:localhost}:8761/eureka
# Use IP address instead of hostname when registering — more reliable in Docker/cloud environments
eureka.instance.prefer-ip-address=true
# Tell Eureka this service uses HTTPS, so the gateway connects on the secure port
eureka.instance.secure-port-enabled=true
eureka.instance.secure-port=${server.port}
eureka.instance.non-secure-port-enabled=false

# ==================== DISTRIBUTED TRACING ====================
# Send 100% of traces to Zipkin (reduce in production to 10-20%)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

# Structured log format with traceId and spanId for cross-service correlation
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}, %X{traceId:-}, %X{spanId:-}] %-5level %logger{36} - %msg%n
