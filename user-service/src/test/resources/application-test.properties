# Test profile — uses a separate database so tests never affect dev data.
# Still a REAL PostgreSQL — no H2 shortcuts.
spring.datasource.url=jdbc:postgresql://localhost:5432/users_test_db
spring.datasource.username=admin
spring.datasource.password=admin123

# Let Hibernate create/drop tables for tests (simpler than Flyway for test lifecycle)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Disable SSL for tests
server.ssl.enabled=false
