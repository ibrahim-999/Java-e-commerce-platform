# Test profile — uses Testcontainers for PostgreSQL and Redis.
# Database connection is injected dynamically by BaseIntegrationTest.

# Let Hibernate create/drop tables for tests (simpler than Flyway for test lifecycle)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Disable SSL for tests
server.ssl.enabled=false

# JWT config for tests
jwt.secret=test-secret-key-that-is-at-least-32-characters-long-for-testing
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# Use Redis cache type (Testcontainers provides the connection)
spring.cache.type=redis
