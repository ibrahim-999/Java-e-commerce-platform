# ==================== CONFIG SERVER ====================
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888

# ==================== Server ====================
spring.application.name=notification-service
server.port=8085

# ==================== Kafka Consumer ====================
# bootstrap-servers: where Kafka is running (localhost for dev, kafka:9092 in Docker)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# consumer.group-id: identifies this service as a consumer group.
# Kafka delivers each message to ONE consumer per group.
# If you run 3 instances of notification-service, only ONE gets each message.
# This prevents duplicate notifications.
spring.kafka.consumer.group-id=notification-group

# auto-offset-reset: what to do when this consumer joins for the first time.
#   "earliest" = read ALL messages from the beginning (catch up on missed messages)
#   "latest"   = only read NEW messages (ignore history)
# We use "earliest" so notification-service doesn't miss events that happened
# while it was down.
spring.kafka.consumer.auto-offset-reset=earliest

# Deserialization: how to convert Kafka bytes back into Java objects.
# Keys are Strings (e.g., "user-7", "order-15")
# Values are Strings (JSON) — we deserialize JSON manually for safety.
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ==================== Kafka Producer ====================
# notification-service also produces to Dead Letter Topics when processing fails.
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ==================== Actuator ====================
management.endpoints.web.exposure.include=health,info

# ==================== EUREKA SERVICE DISCOVERY ====================
eureka.client.service-url.defaultZone=http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@${EUREKA_HOST:localhost}:8761/eureka
eureka.instance.prefer-ip-address=true

# ==================== DISTRIBUTED TRACING ====================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}, %X{traceId:-}, %X{spanId:-}] %-5level %logger{36} - %msg%n
