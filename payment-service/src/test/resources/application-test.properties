# ==================== Test Database ====================
spring.datasource.url=jdbc:postgresql://localhost:5435/payments_test_db
spring.datasource.username=admin
spring.datasource.password=admin123

# Let Hibernate create/drop tables for tests (no Flyway)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Flyway for tests — Hibernate manages the schema
spring.flyway.enabled=false
