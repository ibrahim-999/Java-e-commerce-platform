# Test profile — uses Testcontainers for PostgreSQL.
# Database connection is injected dynamically by BaseIntegrationTest.

# Let Hibernate create/drop tables for tests (no Flyway)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Flyway for tests — Hibernate manages the schema
spring.flyway.enabled=false
