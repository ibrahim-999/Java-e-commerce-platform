# ==================== CONFIG SERVER ====================
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888

# ==================== Server ====================
spring.application.name=payment-service
server.port=8084

# ==================== Database ====================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5435/payments_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin123}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==================== Flyway ====================
spring.flyway.enabled=true

# ==================== Swagger ====================
springdoc.swagger-ui.path=/swagger-ui.html

# ==================== Actuator ====================
management.endpoints.web.exposure.include=health,info

# ==================== Kafka Producer ====================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ==================== Resilience4j Retry ====================
# When a gateway call fails, retry up to 3 times with exponential backoff.
#
# Exponential backoff: wait 1s, then 2s, then 4s between retries.
# Why exponential? If the gateway is overloaded:
#   - Fixed interval (1s, 1s, 1s) = hammering a sick server
#   - Exponential (1s, 2s, 4s) = giving it time to recover
#
# maxAttempts: total attempts including the first one (3 = 1 original + 2 retries)
# waitDuration: initial wait before first retry
# exponentialBackoffMultiplier: each wait = previous wait × multiplier
resilience4j.retry.instances.paymentGateway.maxAttempts=3
resilience4j.retry.instances.paymentGateway.waitDuration=1000
resilience4j.retry.instances.paymentGateway.enableExponentialBackoff=true
resilience4j.retry.instances.paymentGateway.exponentialBackoffMultiplier=2

# ==================== EUREKA SERVICE DISCOVERY ====================
eureka.client.service-url.defaultZone=http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@${EUREKA_HOST:localhost}:8761/eureka
eureka.instance.prefer-ip-address=true

# ==================== DISTRIBUTED TRACING ====================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}, %X{traceId:-}, %X{spanId:-}] %-5level %logger{36} - %msg%n
